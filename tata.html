<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Séries · Wordle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
–bg: #0c0c0e;
–surface: #131316;
–border: #222228;
–text: #f0ede8;
–muted: #5a5860;
–accent: #c9a96e;
–correct: #4a7c59;
–present: #b5813a;
–absent: #2a2a30;
–correct-text: #d4edda;
–present-text: #fdebc8;
}

html, body {
height: 100%;
background: var(–bg);
color: var(–text);
font-family: ‘Montserrat’, sans-serif;
overflow: hidden;
position: fixed;
width: 100%;
}

/* ── SCREENS ── */
.screen { display: none; flex-direction: column; height: 100dvh; width: 100%; }
.screen.active { display: flex; }

/* ── SERIES SELECT ── */
#screen-select {
align-items: center;
justify-content: center;
padding: 40px 28px;
gap: 0;
background: var(–bg);
}

.select-eyebrow {
font-family: ‘Montserrat’, sans-serif;
font-size: 10px;
letter-spacing: 4px;
text-transform: uppercase;
color: var(–accent);
margin-bottom: 16px;
}

.select-title {
font-family: ‘Cormorant Garamond’, serif;
font-size: 42px;
font-weight: 300;
color: var(–text);
text-align: center;
line-height: 1.1;
margin-bottom: 8px;
}

.select-sub {
font-size: 11px;
color: var(–muted);
letter-spacing: 1px;
text-align: center;
margin-bottom: 48px;
}

.series-list {
width: 100%;
max-width: 340px;
display: flex;
flex-direction: column;
gap: 10px;
}

.series-btn {
width: 100%;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 12px;
padding: 18px 22px;
display: flex;
align-items: center;
justify-content: space-between;
cursor: pointer;
transition: border-color 0.2s, background 0.2s;
-webkit-appearance: none;
}

.series-btn:active {
background: #1a1a1f;
border-color: var(–accent);
}

.series-btn-name {
font-family: ‘Cormorant Garamond’, serif;
font-size: 20px;
font-weight: 400;
color: var(–text);
text-align: left;
}

.series-btn-count {
font-size: 10px;
letter-spacing: 1.5px;
color: var(–muted);
text-transform: uppercase;
}

.series-btn-arrow {
color: var(–accent);
font-size: 16px;
margin-left: 12px;
opacity: 0.6;
}

/* ── GAME SCREEN ── */
#screen-game {
flex-direction: column;
overflow: hidden;
}

/* Header */
.game-header {
padding: 16px 20px 12px;
display: flex;
align-items: center;
justify-content: space-between;
border-bottom: 1px solid var(–border);
flex-shrink: 0;
}

.header-back {
width: 36px; height: 36px;
display: flex; align-items: center; justify-content: center;
cursor: pointer;
color: var(–muted);
font-size: 20px;
border-radius: 8px;
transition: color 0.2s;
}
.header-back:active { color: var(–text); }

.header-center {
text-align: center;
flex: 1;
}

.header-series {
font-family: ‘Cormorant Garamond’, serif;
font-size: 18px;
font-weight: 400;
color: var(–text);
line-height: 1;
}

.header-date {
font-size: 9px;
letter-spacing: 2px;
color: var(–muted);
text-transform: uppercase;
margin-top: 3px;
}

.header-right { width: 36px; }

/* Game body */
.game-body {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 12px 20px;
gap: 16px;
overflow: hidden;
}

/* Grid */
.grid {
display: flex;
flex-direction: column;
gap: 6px;
}

.grid-row {
display: flex;
gap: 6px;
}

.grid-cell {
width: 52px;
height: 52px;
border: 1.5px solid var(–border);
border-radius: 8px;
display: flex;
align-items: center;
justify-content: center;
font-family: ‘Montserrat’, sans-serif;
font-size: 20px;
font-weight: 600;
color: var(–text);
text-transform: uppercase;
background: var(–surface);
transition: border-color 0.1s;
position: relative;
overflow: hidden;
}

.grid-cell.filled { border-color: var(–muted); }
.grid-cell.active-row { border-color: #3a3a45; }

.grid-cell.correct  { background: var(–correct); border-color: var(–correct); color: var(–correct-text); }
.grid-cell.present  { background: var(–present); border-color: var(–present); color: var(–present-text); }
.grid-cell.absent   { background: var(–absent);  border-color: var(–absent);  color: var(–muted); }

.grid-cell.flip {
animation: flip 0.4s ease forwards;
}

@keyframes flip {
0%   { transform: rotateX(0deg); }
50%  { transform: rotateX(-90deg); }
100% { transform: rotateX(0deg); }
}

.grid-cell.pop {
animation: pop 0.1s ease;
}
@keyframes pop {
0%   { transform: scale(1); }
50%  { transform: scale(1.12); }
100% { transform: scale(1); }
}

.grid-cell.shake { animation: shake 0.4s ease; }
@keyframes shake {
0%,100% { transform: translateX(0); }
20%,60% { transform: translateX(-4px); }
40%,80% { transform: translateX(4px); }
}

/* Message */
.msg-bar {
height: 28px;
display: flex;
align-items: center;
justify-content: center;
}

.msg-text {
font-size: 12px;
letter-spacing: 1px;
color: var(–accent);
opacity: 0;
transition: opacity 0.3s;
text-transform: uppercase;
}
.msg-text.show { opacity: 1; }

/* Keyboard */
.keyboard {
width: 100%;
max-width: 380px;
display: flex;
flex-direction: column;
gap: 8px;
flex-shrink: 0;
padding-bottom: env(safe-area-inset-bottom, 8px);
}

.key-row {
display: flex;
justify-content: center;
gap: 5px;
}

.key {
height: 52px;
min-width: 32px;
flex: 1;
max-width: 40px;
background: #1e1e24;
border: none;
border-radius: 7px;
color: var(–text);
font-family: ‘Montserrat’, sans-serif;
font-size: 13px;
font-weight: 500;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
text-transform: uppercase;
transition: background 0.15s, transform 0.1s;
-webkit-appearance: none;
user-select: none;
}

.key:active { transform: scale(0.94); }
.key.wide { max-width: 56px; font-size: 11px; letter-spacing: 0.5px; }

.key.correct { background: var(–correct); color: var(–correct-text); }
.key.present { background: var(–present); color: var(–present-text); }
.key.absent  { background: var(–absent);  color: #3a3a42; }

/* ── END SCREEN ── */
#screen-end {
align-items: center;
justify-content: center;
padding: 40px 28px;
gap: 0;
}

.end-eyebrow {
font-size: 10px;
letter-spacing: 4px;
text-transform: uppercase;
color: var(–accent);
margin-bottom: 16px;
}

.end-title {
font-family: ‘Cormorant Garamond’, serif;
font-size: 48px;
font-weight: 300;
color: var(–text);
text-align: center;
margin-bottom: 8px;
}

.end-word {
font-family: ‘Montserrat’, sans-serif;
font-size: 13px;
letter-spacing: 4px;
color: var(–muted);
text-transform: uppercase;
margin-bottom: 40px;
}

.end-stats {
display: flex;
gap: 32px;
margin-bottom: 48px;
}

.stat { text-align: center; }
.stat-num {
font-family: ‘Cormorant Garamond’, serif;
font-size: 40px;
font-weight: 300;
color: var(–text);
line-height: 1;
}
.stat-label {
font-size: 9px;
letter-spacing: 2px;
color: var(–muted);
text-transform: uppercase;
margin-top: 4px;
}

.end-btn {
width: 100%;
max-width: 280px;
background: transparent;
border: 1px solid var(–accent);
color: var(–accent);
font-family: ‘Montserrat’, sans-serif;
font-size: 11px;
letter-spacing: 3px;
text-transform: uppercase;
padding: 16px;
border-radius: 12px;
cursor: pointer;
-webkit-appearance: none;
transition: background 0.2s;
}
.end-btn:active { background: rgba(201,169,110,0.1); }

.end-next {
margin-top: 10px;
font-size: 10px;
color: var(–muted);
letter-spacing: 1.5px;
text-transform: uppercase;
}
</style>

</head>
<body>

<!-- SCREEN 1 : Choix de la série -->

<div id="screen-select" class="screen active">
  <div class="select-eyebrow">Devine le mot</div>
  <div class="select-title">Séries</div>
  <div class="select-sub">Un mot par jour · 6 essais</div>
  <div class="series-list" id="series-list"></div>
</div>

<!-- SCREEN 2 : Jeu -->

<div id="screen-game" class="screen">
  <div class="game-header">
    <div class="header-back" id="back-btn">←</div>
    <div class="header-center">
      <div class="header-series" id="header-series-name"></div>
      <div class="header-date" id="header-date"></div>
    </div>
    <div class="header-right"></div>
  </div>
  <div class="game-body">
    <div class="grid" id="grid"></div>
    <div class="msg-bar"><div class="msg-text" id="msg"></div></div>
  </div>
  <div class="keyboard" id="keyboard"></div>
</div>

<!-- SCREEN 3 : Fin -->

<div id="screen-end" class="screen">
  <div class="end-eyebrow" id="end-eyebrow">Bravo</div>
  <div class="end-title" id="end-title"></div>
  <div class="end-word" id="end-word"></div>
  <div class="end-stats">
    <div class="stat"><div class="stat-num" id="stat-attempts">0</div><div class="stat-label">Essais</div></div>
    <div class="stat"><div class="stat-num" id="stat-streak">0</div><div class="stat-label">Série</div></div>
  </div>
  <button class="end-btn" id="end-back">Choisir une série</button>
  <div class="end-next" id="end-next"></div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
const SERIES = [
  {
    id: 'scott',
    name: 'Les Frères Scott',
    words: ['LUCAS','NATHA','PEYTON','BROOKE','HALEY','SCOTT','KAREN','DANTEA','MOUTH','SKILLS','RACHEL','COMET','ARBRE','MATCH','DANSE','CHEER','KEITH','LIVRE','REVE','MUSIQUE'].filter(w => w.length >= 4 && w.length <= 7),
  },
  {
    id: 'ouat',
    name: 'Once Upon a Time',
    words: ['EMMA','REGINA','MIROIR','MAGIE','POMME','SORT','FORET','CHARME','PRINCE','PIRATE','CROCHET','DRAGON','MALEF','OGRE','GNOME','REINE','PORTAIL','TEMPS','SORTIL'],
  },
  {
    id: 'riverdale',
    name: 'Riverdale',
    words: ['ARCHIE','BETTY','VERONICA','JUGHEAD','CHERYL','JASON','LODGE','COOPER','BLOSSOM','VIPER','BANDE','NUIT','MEURTRE','SERIAL','MAPLE','CHOCK','JINGLE'],
  },
  {
    id: 'charmed',
    name: 'Charmed',
    words: ['PIPER','PHOEBE','PAIGE','PRUE','POTION','SORT','DEMON','ORBE','WYATT','CHRIS','LIVRE','SORCIER','MAGIE','TRIQUER','TOTEM','ANCRE','NEXUS'],
  },
  {
    id: 'supernatural',
    name: 'Supernatural',
    words: ['DEAN','SAM','CASTIEL','BOBBY','IMPALA','DEMON','ANGE','CHASSE','SCEAU','DIABLE','LUCIFER','ENFER','PARADIS','GRIMOIRE','SCEAU','CROIX','LANCE','BUNKER','MONSTRE'],
  },
];

// Normalise — garde uniquement les mots 4-7 lettres, majuscules, sans accents
function norm(w) {
  return w.toUpperCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^A-Z]/g, '');
}

SERIES.forEach(s => {
  s.words = [...new Set(s.words.map(norm).filter(w => w.length >= 4 && w.length <= 7))];
});

// ── STATE ─────────────────────────────────────────────────────────────────
let currentSeries = null;
let targetWord = '';
let wordLen = 0;
let MAX_GUESSES = 6;
let currentRow = 0;
let currentCol = 0;
let currentGuess = [];
let gameOver = false;
let keyState = {};

// ── UTILS ─────────────────────────────────────────────────────────────────
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

function getDailyWord(series) {
  const today = todayStr();
  // Hash date + series id pour avoir un mot stable par jour
  let h = 0;
  const str = today + series.id;
  for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) >>> 0;
  return series.words[h % series.words.length];
}

function formatDate() {
  return new Date().toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
}

function storageKey(seriesId) { return `wordle_${seriesId}_${todayStr()}`; }

function saveState(seriesId, state) {
  try { localStorage.setItem(storageKey(seriesId), JSON.stringify(state)); } catch(e) {}
}

function loadState(seriesId) {
  try {
    const s = localStorage.getItem(storageKey(seriesId));
    return s ? JSON.parse(s) : null;
  } catch(e) { return null; }
}

function getStreak(seriesId) {
  try { return parseInt(localStorage.getItem(`streak_${seriesId}`) || '0'); } catch(e) { return 0; }
}
function setStreak(seriesId, v) {
  try { localStorage.setItem(`streak_${seriesId}`, String(v)); } catch(e) {}
}

// ── SCREENS ───────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── SERIES SELECT ─────────────────────────────────────────────────────────
function buildSeriesSelect() {
  const list = document.getElementById('series-list');
  list.innerHTML = '';
  SERIES.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'series-btn';

    const word = getDailyWord(s);
    const saved = loadState(s.id);
    const done = saved && saved.gameOver;

    btn.innerHTML = `
      <div>
        <div class="series-btn-name">${s.name}</div>
        <div class="series-btn-count" style="margin-top:4px">${done ? '✓ Terminé aujourd\'hui' : `${word.length} lettres · ${s.words.length} mots`}</div>
      </div>
      <div class="series-btn-arrow">›</div>
    `;
    btn.addEventListener('click', () => startGame(s));
    list.appendChild(btn);
  });
}

// ── GAME ──────────────────────────────────────────────────────────────────
function startGame(series) {
  currentSeries = series;
  targetWord = getDailyWord(series);
  wordLen = targetWord.length;
  currentRow = 0;
  currentCol = 0;
  currentGuess = [];
  gameOver = false;
  keyState = {};

  document.getElementById('header-series-name').textContent = series.name;
  document.getElementById('header-date').textContent = formatDate();

  buildGrid();
  buildKeyboard();
  showScreen('screen-game');

  // Restore saved state
  const saved = loadState(series.id);
  if (saved) {
    restoreGame(saved);
  }
}

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  // Adjust cell size based on word length
  const cellSize = wordLen <= 5 ? 56 : wordLen === 6 ? 50 : 44;
  const gap = 6;

  grid.style.setProperty('--cell', cellSize + 'px');

  for (let r = 0; r < MAX_GUESSES; r++) {
    const row = document.createElement('div');
    row.className = 'grid-row';
    row.id = `row-${r}`;
    for (let c = 0; c < wordLen; c++) {
      const cell = document.createElement('div');
      cell.className = 'grid-cell';
      cell.id = `cell-${r}-${c}`;
      cell.style.width = cellSize + 'px';
      cell.style.height = cellSize + 'px';
      cell.style.fontSize = cellSize >= 56 ? '22px' : cellSize >= 50 ? '20px' : '17px';
      row.appendChild(cell);
    }
    grid.appendChild(row);
  }
  highlightCurrentRow();
}

function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  const rows = [
    ['A','Z','E','R','T','Y','U','I','O','P'],
    ['Q','S','D','F','G','H','J','K','L','M'],
    ['ENTER','W','X','C','V','B','N','⌫']
  ];
  rows.forEach(row => {
    const rowEl = document.createElement('div');
    rowEl.className = 'key-row';
    row.forEach(k => {
      const btn = document.createElement('button');
      btn.className = 'key' + (k.length > 1 ? ' wide' : '');
      btn.textContent = k === 'ENTER' ? '↵' : k;
      btn.dataset.key = k;
      btn.addEventListener('click', () => handleKey(k));
      rowEl.appendChild(btn);
    });
    kb.appendChild(rowEl);
  });
}

function highlightCurrentRow() {
  document.querySelectorAll('.grid-cell').forEach(c => c.classList.remove('active-row'));
  if (currentRow < MAX_GUESSES) {
    for (let c = 0; c < wordLen; c++) {
      document.getElementById(`cell-${currentRow}-${c}`)?.classList.add('active-row');
    }
  }
}

function handleKey(k) {
  if (gameOver) return;
  if (k === '⌫' || k === 'BACKSPACE') deleteLetter();
  else if (k === 'ENTER') submitGuess();
  else if (/^[A-Z]$/.test(k)) addLetter(k);
}

function addLetter(l) {
  if (currentCol >= wordLen) return;
  const cell = document.getElementById(`cell-${currentRow}-${currentCol}`);
  cell.textContent = l;
  cell.classList.add('filled', 'pop');
  setTimeout(() => cell.classList.remove('pop'), 120);
  currentGuess.push(l);
  currentCol++;
}

function deleteLetter() {
  if (currentCol <= 0) return;
  currentCol--;
  currentGuess.pop();
  const cell = document.getElementById(`cell-${currentRow}-${currentCol}`);
  cell.textContent = '';
  cell.classList.remove('filled');
}

function submitGuess() {
  if (currentCol < wordLen) { showMsg('Mot trop court'); shakeRow(); return; }

  const guess = currentGuess.join('');
  const result = scoreGuess(guess, targetWord);

  revealRow(currentRow, guess, result, () => {
    updateKeyboard(guess, result);

    const won = result.every(r => r === 'correct');
    if (won) {
      gameOver = true;
      const attempts = currentRow + 1;
      const streak = getStreak(currentSeries.id) + 1;
      setStreak(currentSeries.id, streak);
      saveState(currentSeries.id, buildSaveState());
      setTimeout(() => showEnd(true, attempts, streak), 600);
      return;
    }

    currentRow++;
    currentCol = 0;
    currentGuess = [];

    if (currentRow >= MAX_GUESSES) {
      gameOver = true;
      saveState(currentSeries.id, buildSaveState());
      setTimeout(() => showEnd(false, MAX_GUESSES, getStreak(currentSeries.id)), 600);
      return;
    }

    highlightCurrentRow();
    saveState(currentSeries.id, buildSaveState());
  });
}

function scoreGuess(guess, target) {
  const result = Array(target.length).fill('absent');
  const tArr = target.split('');
  const gArr = guess.split('');
  const used = Array(target.length).fill(false);

  // First pass: correct
  for (let i = 0; i < target.length; i++) {
    if (gArr[i] === tArr[i]) { result[i] = 'correct'; used[i] = true; gArr[i] = null; }
  }
  // Second pass: present
  for (let i = 0; i < target.length; i++) {
    if (result[i] === 'correct') continue;
    const idx = tArr.findIndex((t, j) => !used[j] && t === gArr[i]);
    if (idx !== -1) { result[i] = 'present'; used[idx] = true; }
  }
  return result;
}

function revealRow(row, guess, result, cb) {
  const delay = 350;
  result.forEach((r, i) => {
    setTimeout(() => {
      const cell = document.getElementById(`cell-${row}-${i}`);
      cell.classList.remove('active-row');
      cell.classList.add('flip');
      setTimeout(() => {
        cell.classList.add(r);
        cell.classList.remove('flip');
      }, delay / 2);
    }, i * delay);
  });
  setTimeout(cb, result.length * delay + 200);
}

function updateKeyboard(guess, result) {
  const priority = { correct: 3, present: 2, absent: 1 };
  guess.split('').forEach((l, i) => {
    const cur = keyState[l];
    const next = result[i];
    if (!cur || priority[next] > priority[cur]) keyState[l] = next;
  });
  document.querySelectorAll('.key').forEach(btn => {
    const k = btn.dataset.key;
    if (keyState[k]) { btn.classList.remove('correct','present','absent'); btn.classList.add(keyState[k]); }
  });
}

function shakeRow() {
  for (let c = 0; c < wordLen; c++) {
    const cell = document.getElementById(`cell-${currentRow}-${c}`);
    cell.classList.add('shake');
    setTimeout(() => cell.classList.remove('shake'), 400);
  }
}

let msgTimer = null;
function showMsg(text) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.classList.add('show');
  if (msgTimer) clearTimeout(msgTimer);
  msgTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

// ── SAVE / RESTORE ────────────────────────────────────────────────────────
function buildSaveState() {
  const rows = [];
  for (let r = 0; r < currentRow + (gameOver ? 0 : 0); r++) {
    const cells = [];
    for (let c = 0; c < wordLen; c++) {
      const el = document.getElementById(`cell-${r}-${c}`);
      cells.push({ letter: el.textContent, state: el.className.replace('grid-cell ','').trim() });
    }
    rows.push(cells);
  }
  return { rows, currentRow, gameOver, keyState, targetWord };
}

function restoreGame(saved) {
  if (saved.targetWord !== targetWord) return; // new day
  saved.rows.forEach((row, r) => {
    row.forEach((cell, c) => {
      const el = document.getElementById(`cell-${r}-${c}`);
      if (cell.letter) {
        el.textContent = cell.letter;
        el.className = 'grid-cell ' + cell.state;
      }
    });
  });
  currentRow = saved.currentRow;
  keyState = saved.keyState || {};
  gameOver = saved.gameOver;

  // restore keyboard colors
  document.querySelectorAll('.key').forEach(btn => {
    const k = btn.dataset.key;
    if (keyState[k]) btn.classList.add(keyState[k]);
  });

  if (gameOver) {
    const won = document.getElementById(`cell-${currentRow > 0 ? currentRow - 1 : 0}-0`)?.classList.contains('correct');
    setTimeout(() => showEnd(won, currentRow, getStreak(currentSeries.id)), 200);
    return;
  }

  currentCol = 0;
  currentGuess = [];
  highlightCurrentRow();
}

// ── END SCREEN ────────────────────────────────────────────────────────────
function showEnd(won, attempts, streak) {
  document.getElementById('end-eyebrow').textContent = won ? 'Bravo !' : 'Dommage…';
  document.getElementById('end-title').textContent = won
    ? attempts === 1 ? 'Parfait' : attempts <= 3 ? 'Excellent' : 'Bien joué'
    : 'Perdu';
  document.getElementById('end-word').textContent = `Le mot était · ${targetWord}`;
  document.getElementById('stat-attempts').textContent = won ? attempts : '✗';
  document.getElementById('stat-streak').textContent = streak;
  document.getElementById('end-next').textContent = 'Prochain mot demain';
  showScreen('screen-end');
}

// ── KEYBOARD EVENTS ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Backspace') handleKey('BACKSPACE');
  else if (e.key === 'Enter') handleKey('ENTER');
  else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toUpperCase());
});

document.getElementById('back-btn').addEventListener('click', () => {
  showScreen('screen-select');
  buildSeriesSelect();
});

document.getElementById('end-back').addEventListener('click', () => {
  showScreen('screen-select');
  buildSeriesSelect();
});

// ── INIT ──────────────────────────────────────────────────────────────────
buildSeriesSelect();
</script>

</body>
</html>
