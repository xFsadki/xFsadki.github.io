<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Netflix – Connexion facile</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');

:root {
–red: #E50914;
–dark: #0a0a0a;
–card: #141414;
–border: #2a2a2a;
–text: #f0f0f0;
–muted: #888;
}

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
background: var(–dark);
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
min-height: 100dvh;
display: flex;
flex-direction: column;
align-items: center;
padding-bottom: 48px;
overflow-x: hidden;
}

header { width: 100%; padding: 28px 24px 16px; }
.logo { font-family: ‘Bebas Neue’, sans-serif; font-size: 32px; color: var(–red); letter-spacing: 1px; line-height: 1; }
.logo-sub { font-size: 11px; color: var(–muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }

.card { width: calc(100% - 32px); max-width: 420px; background: var(–card); border: 1px solid var(–border); border-radius: 20px; overflow: hidden; }

.viewfinder-wrap { position: relative; width: 100%; aspect-ratio: 1; background: #000; overflow: hidden; }
#video { width: 100%; height: 100%; object-fit: cover; display: block; }

.scan-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
.scan-frame { width: 62%; aspect-ratio: 1; position: relative; }
.scan-frame::before, .scan-frame::after, .scan-frame .c1, .scan-frame .c2 { content: ‘’; position: absolute; width: 22px; height: 22px; border-color: var(–red); border-style: solid; }
.scan-frame::before { top:0; left:0; border-width: 3px 0 0 3px; }
.scan-frame::after  { top:0; right:0; border-width: 3px 3px 0 0; }
.scan-frame .c1     { bottom:0; right:0; border-width: 0 3px 3px 0; }
.scan-frame .c2     { bottom:0; left:0; border-width: 0 0 3px 3px; }

.scan-line { position: absolute; left: 19%; right: 19%; height: 2px; background: linear-gradient(90deg, transparent, var(–red), transparent); animation: scanline 2s ease-in-out infinite; border-radius: 2px; }
@keyframes scanline { 0% { top: 19%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 81%; opacity: 0; } }

.scanning-label { position: absolute; bottom: 14px; left: 0; right: 0; text-align: center; font-size: 12px; color: rgba(255,255,255,0.6); letter-spacing: 1.5px; text-transform: uppercase; }

.instructions { padding: 20px; display: flex; flex-direction: column; gap: 10px; }
.instruction-row { display: flex; align-items: center; gap: 12px; }
.inst-num { font-family: ‘Bebas Neue’, sans-serif; font-size: 20px; color: var(–red); width: 20px; flex-shrink: 0; }
.inst-text { font-size: 14px; color: var(–muted); line-height: 1.4; }

.btn-wrap { padding: 0 16px 20px; }

#start-btn { width: 100%; background: var(–red); color: #fff; font-family: ‘Bebas Neue’, sans-serif; font-size: 22px; letter-spacing: 1.5px; border: none; border-radius: 14px; padding: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: transform 0.15s, opacity 0.15s; }
#start-btn:active { transform: scale(0.97); opacity: 0.9; }
#start-btn:disabled { opacity: 0.45; }
#start-btn svg { width: 22px; height: 22px; stroke: #fff; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

#result-box { display: none; width: calc(100% - 32px); max-width: 420px; margin-top: 16px; background: var(–card); border: 1px solid var(–border); border-radius: 20px; overflow: hidden; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
@keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

.result-inner { padding: 24px 20px 20px; }
.result-check { width: 52px; height: 52px; background: rgba(76,175,80,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; }
.result-check svg { width: 28px; height: 28px; stroke: #4caf50; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.result-title { text-align: center; font-size: 18px; font-weight: 500; margin-bottom: 4px; }
.result-sub   { text-align: center; font-size: 13px; color: var(–muted); margin-bottom: 20px; }

.connect-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; background: #4caf50; color: #fff; font-family: ‘Bebas Neue’, sans-serif; font-size: 22px; letter-spacing: 1.5px; border: none; border-radius: 14px; padding: 18px; cursor: pointer; text-decoration: none; margin-bottom: 12px; transition: transform 0.15s; }
.connect-btn:active { transform: scale(0.97); }
.connect-btn svg { width: 20px; height: 20px; stroke: #fff; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

.retry-btn { width: 100%; background: transparent; border: 1px solid var(–border); color: var(–muted); font-family: ‘DM Sans’, sans-serif; font-size: 14px; padding: 12px; border-radius: 12px; cursor: pointer; }
.retry-btn:active { background: var(–border); }

#msg-box { display: none; width: calc(100% - 32px); max-width: 420px; margin-top: 16px; padding: 18px; border-radius: 16px; font-size: 14px; text-align: center; line-height: 1.6; white-space: pre-line; }
#msg-box.error { background: rgba(229,9,20,0.08); border: 1px solid rgba(229,9,20,0.25); color: #ff6b6b; }
#msg-box.info  { background: rgba(255,200,0,0.07); border: 1px solid rgba(255,200,0,0.2); color: #ccc; }
</style>

</head>
<body>

<header>
  <div class="logo">Netflix</div>
  <div class="logo-sub">Connexion facile</div>
</header>

<div class="card">
  <div class="viewfinder-wrap">
    <video id="video" playsinline autoplay muted></video>
    <div class="scan-overlay">
      <div class="scan-frame"><div class="c1"></div><div class="c2"></div></div>
      <div class="scan-line"></div>
    </div>
    <div class="scanning-label" id="scan-label">En attente…</div>
  </div>

  <div class="instructions">
    <div class="instruction-row"><div class="inst-num">1</div><div class="inst-text">Appuie sur le bouton ci-dessous</div></div>
    <div class="instruction-row"><div class="inst-num">2</div><div class="inst-text">Pointe la caméra vers le QR code sur la télé</div></div>
    <div class="instruction-row"><div class="inst-num">3</div><div class="inst-text">La connexion se fait automatiquement ✨</div></div>
  </div>

  <div class="btn-wrap">
    <button id="start-btn">
      <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      Scanner le QR Code
    </button>
  </div>
</div>

<div id="result-box">
  <div class="result-inner">
    <div class="result-check">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="result-title">QR code détecté ! 🎉</div>
    <div class="result-sub">Appuie sur le bouton pour te connecter</div>
    <a id="connect-link" href="#" class="connect-btn">
      <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Me connecter à Netflix
    </a>
    <button class="retry-btn" id="retry-btn">🔄 Scanner un autre QR code</button>
  </div>
</div>

<div id="msg-box"></div>

<script>
  const video       = document.getElementById('video');
  const startBtn    = document.getElementById('start-btn');
  const scanLabel   = document.getElementById('scan-label');
  const resultBox   = document.getElementById('result-box');
  const connectLink = document.getElementById('connect-link');
  const retryBtn    = document.getElementById('retry-btn');
  const msgBox      = document.getElementById('msg-box');

  let scanning = false;
  let stream   = null;
  let detector = null;
  let animFrame = null;

  startBtn.addEventListener('click', startScanner);
  retryBtn.addEventListener('click', () => { resultBox.style.display = 'none'; msgBox.style.display = 'none'; startScanner(); });

  async function startScanner() {
    msgBox.style.display = 'none';
    resultBox.style.display = 'none';
    startBtn.disabled = true;
    scanLabel.textContent = 'Initialisation…';

    // 1. Vérifie BarcodeDetector
    if (!('BarcodeDetector' in window)) {
      showMsg('error', '❌ Ton iPhone doit être sous iOS 17 minimum pour utiliser cette app.\n\nMets à jour iOS dans Réglages → Général → Mise à jour logicielle.');
      scanLabel.textContent = 'Non supporté';
      startBtn.disabled = false;
      return;
    }

    try { detector = new BarcodeDetector({ formats: ['qr_code'] }); }
    catch(e) {
      showMsg('error', '❌ Erreur d\'initialisation du scanner : ' + e.message);
      startBtn.disabled = false;
      return;
    }

    // 2. Demande accès caméra (déclenché par le clic utilisateur)
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 1280 } }
      });
      video.srcObject = stream;
      await video.play();
      scanning = true;
      scanLabel.textContent = 'Pointe vers le QR code…';
      scanLoop();
    } catch (err) {
      startBtn.disabled = false;
      if (err.name === 'NotAllowedError') {
        showMsg('info', '📷 Accès à la caméra refusé.\n\nVa dans Réglages → Safari → Caméra → Autoriser, puis réessaie.');
        scanLabel.textContent = 'Accès refusé';
      } else {
        showMsg('error', '❌ Impossible d\'accéder à la caméra.\n' + err.message);
        scanLabel.textContent = 'Erreur';
      }
    }
  }

  async function scanLoop() {
    if (!scanning) return;
    try {
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        const codes = await detector.detect(video);
        if (codes.length > 0) {
          const url = codes[0].rawValue;
          if (url && url.includes('netflix')) {
            stopScanner();
            showResult(url);
            return;
          }
        }
      }
    } catch(e) {}
    animFrame = requestAnimationFrame(scanLoop);
  }

  function stopScanner() {
    scanning = false;
    if (animFrame) cancelAnimationFrame(animFrame);
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    video.srcObject = null;
    scanLabel.textContent = 'Terminé ✓';
    startBtn.disabled = false;
  }

  function showResult(url) {
    connectLink.href = url;
    resultBox.style.display = 'block';
    resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function showMsg(type, text) {
    msgBox.className = type;
    msgBox.textContent = text;
    msgBox.style.display = 'block';
  }
</script>

</body>
</html>
